<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DACIART MindAR Target Compiler</title>
    <link rel="stylesheet" href="styles/site.css" />
  </head>
  <body class="target-body">
    <main class="target-sheet">
      <header>
        <p class="eyebrow">Developer utility</p>
        <h1>Compile AR Target</h1>
        <p>This generates the `.mind` file required by MindAR. Use it when adding a new printed painting target.</p>
      </header>

      <section class="essay-grid">
        <div>
          <h3>Selected Painting</h3>
          <p id="painting-label">Van Gogh Self-Portrait</p>
        </div>
        <div>
          <h3>Status</h3>
          <p id="compile-status">Ready.</p>
        </div>
      </section>

      <footer>
        <button id="compile-button" class="button primary" type="button">Generate target</button>
        <a class="button" href="print-van-gogh.html">Open Van Gogh Target</a>
      </footer>
    </main>

    <script type="module">
      import { Compiler } from "./vendor/mindar-image.prod.js";

      const status = document.getElementById("compile-status");
      const button = document.getElementById("compile-button");
      const label = document.getElementById("painting-label");
      const params = new URLSearchParams(window.location.search);
      const painting = params.get("painting") || "van-gogh";
      const targets = {
        "van-gogh": {
          label: "Van Gogh Self-Portrait",
          image: "assets/paintings/van-gogh/images/van-gogh__Portrait.jpg",
          output: "van-gogh.mind",
          page: "print-van-gogh.html"
        },
        "van-gogh-bedroom": {
          label: "Van Gogh The Bedroom",
          image: "assets/paintings/van-gogh-bedroom/images/bed_van-gogh.jpeg",
          output: "bed_van-gogh.mind",
          page: "print-van-gogh-bedroom.html"
        },
        "vermeer-girl-with-a-pearl-earring": {
          label: "Vermeer Girl with a Pearl Earring",
          image: "assets/paintings/vermeer_Girl-with-a-Pearl-Earring/images/vermeer_Girl-with-a-Pearl-Earring.jpg",
          output: "vermeer_Girl-with-a-Pearl-Earring.mind",
          page: "print-vermeer-girl-with-a-pearl-earring.html"
        }
      };
      const target = targets[painting] || targets["van-gogh"];

      label.textContent = target.label;
      button.textContent = `Generate ${target.output}`;
      document.querySelector("footer a.button").href = target.page;

      function setStatus(message) {
        status.textContent = message;
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.crossOrigin = "anonymous";
          image.onload = () => resolve(image);
          image.onerror = reject;
          image.src = src;
        });
      }

      button.addEventListener("click", async () => {
        try {
          button.disabled = true;
          setStatus("Loading image...");
          const image = await loadImage(target.image);
          const compiler = new Compiler();
          setStatus("Compiling target. This can take a minute...");
          await compiler.compileImageTargets([image], (progress) => {
            setStatus(`Compiling target: ${Math.round(progress * 100)}%`);
          });
          const exported = compiler.exportData();
          const blob = new Blob([exported], { type: "application/octet-stream" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = target.output;
          link.click();
          URL.revokeObjectURL(url);
          setStatus(`Done. Save the downloaded file to assets/targets/${target.output}.`);
        } catch (error) {
          setStatus(`${error.name}: ${error.message}`);
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
