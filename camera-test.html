<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DACIART Camera Test</title>
    <style>
      :root {
        --bg: #171310;
        --paper: #f5efe4;
        --ink: #241f1a;
        --gold: #c7a45d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
        color: var(--paper);
        background: var(--bg);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(760px, 100%);
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(44px, 8vw, 76px);
        font-weight: 500;
      }

      p {
        color: #d7cabb;
        line-height: 1.5;
      }

      button,
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin: 8px 8px 8px 0;
        padding: 10px 15px;
        border: 1px solid var(--gold);
        color: #1b1309;
        background: var(--gold);
        font-weight: 800;
        text-decoration: none;
      }

      a {
        color: var(--paper);
        background: transparent;
      }

      video {
        width: 100%;
        max-height: 55vh;
        margin-top: 16px;
        background: #000;
      }

      pre {
        padding: 12px;
        overflow: auto;
        color: #ffd8d8;
        background: rgba(90, 10, 10, 0.34);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Camera Test</h1>
      <p>This page only tests browser camera access. If this fails, WebAR cannot start on this browser/device yet.</p>
      <button id="start" type="button">Start Camera Test</button>
      <a href="ar.html">Back to WebAR</a>
      <video id="preview" autoplay playsinline muted></video>
      <pre id="log">Waiting.</pre>
    </main>

    <script>
      const log = document.getElementById("log");
      const video = document.getElementById("preview");

      document.getElementById("start").addEventListener("click", async () => {
        log.textContent = "Requesting camera...";
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
          });
          video.srcObject = stream;
          log.textContent = [
            "Camera works.",
            `Secure context: ${window.isSecureContext}`,
            `Tracks: ${stream.getVideoTracks().map((track) => track.label || track.kind).join(", ")}`,
            `User agent: ${navigator.userAgent}`
          ].join("\n");
        } catch (error) {
          log.textContent = [
            "Camera failed.",
            `Error name: ${error.name}`,
            `Error message: ${error.message}`,
            `Secure context: ${window.isSecureContext}`,
            `getUserMedia available: ${Boolean(navigator.mediaDevices?.getUserMedia)}`,
            `User agent: ${navigator.userAgent}`
          ].join("\n");
        }
      });
    </script>
  </body>
</html>
